<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wyszukiwarka SID</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --red:        #ff2d55;
    --red-dark:   #c41f3e;
    --red-glow:   rgba(255, 45, 85, 0.18);
    --bg:         #07040f;
    --bg2:        #0e0a1a;
    --bg3:        #160f28;
    --surface:    rgba(255,255,255,0.04);
    --surface2:   rgba(255,255,255,0.07);
    --border:     rgba(255,255,255,0.08);
    --border2:    rgba(255,255,255,0.14);
    --text:       #f0edf8;
    --muted:      #7a7490;
    --muted2:     #b0aac0;
    --green:      #22c55e;
    --mono:       'JetBrains Mono', monospace;
    --sans:       'Inter', sans-serif;
}

html, body {
    min-height: 100vh;
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
}

/* subtle grid texture */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(255,45,85,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,45,85,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
}

body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(255,45,85,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
}

/* ── ADMIN BAR ── */
.admin-bar {
    position: fixed;
    top: 16px;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(10,6,20,0.90);
    padding: 8px 12px;
    border-radius: 10px;
    border: 1px solid var(--border2);
    z-index: 100;
    backdrop-filter: blur(20px);
}

.admin-bar-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
}

.admin-bar input {
    width: 90px;
    padding: 6px 9px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.admin-bar input::placeholder { color: var(--muted); }

.admin-bar input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px var(--red-glow);
}

.admin-bar .btn-login {
    padding: 6px 12px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.02em;
}

.admin-bar .btn-login:hover { background: var(--red-dark); transform: translateY(-1px); }

.logged-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 500;
    color: var(--green);
}

.logged-badge .dot {
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
}

.btn-logout {
    padding: 5px 10px;
    background: transparent;
    color: var(--muted2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: var(--sans);
    transition: color 0.2s, border-color 0.2s;
}

.btn-logout:hover { color: var(--red); border-color: var(--red); }

/* ── MAIN LAYOUT ── */
.page {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 80px 24px 80px;
}

/* ── HEADER ── */
.header {
    text-align: center;
    margin-bottom: 48px;
}

.logo-wrap {
    display: inline-block;
    margin-bottom: 20px;
}

.logo-wrap img {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    border: 1px solid var(--border2);
}

.site-title {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    color: var(--text);
}

.site-title span { color: var(--red); }

.site-sub {
    margin-top: 8px;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.01em;
}

.stats-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    padding: 6px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 13px;
    color: var(--muted2);
}

.stats-chip .count {
    color: var(--red);
    font-weight: 700;
    font-size: 14px;
    font-family: var(--mono);
}

/* ── SEARCH ── */
.search-wrap {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
}

.search-wrap input {
    flex: 1;
    padding: 14px 18px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-family: var(--mono);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.search-wrap input::placeholder { color: var(--muted); }

.search-wrap input:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 4px var(--red-glow);
}

.btn-search {
    padding: 14px 26px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    font-family: var(--sans);
    transition: background 0.2s, transform 0.15s;
    white-space: nowrap;
}

.btn-search:hover { background: var(--red-dark); transform: translateY(-1px); }
.btn-search:active { transform: translateY(0); }

/* ── RESULT BOX ── */
.result-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    min-height: 180px;
    transition: border-color 0.3s;
}

.result-box.has-data {
    border-color: rgba(255,45,85,0.25);
}

.result-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 130px;
    gap: 10px;
    color: var(--muted);
    font-size: 14px;
}

.result-placeholder .icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
}

.result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
}

.result-header-dot {
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--green);
}

.result-header h3 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted2);
}

.data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
}

.data-field {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
}

.data-field.full { grid-column: 1 / -1; }

.data-field .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
}

.data-field .value {
    font-size: 14px;
    color: var(--text);
    font-family: var(--mono);
    word-break: break-all;
}

.data-field .value.sid-val {
    font-size: 13px;
    color: var(--red);
    font-weight: 600;
}

.notes-val {
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.7;
    color: var(--muted2);
    white-space: pre-wrap;
}

.result-footer {
    padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
}

.result-footer strong { color: var(--muted2); font-weight: 500; }

.not-found {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 130px;
    gap: 8px;
    color: var(--muted);
    font-size: 14px;
}

.not-found .nf-icon {
    font-size: 28px;
    opacity: 0.5;
}

/* ── ADMIN PANEL ── */
.admin-section {
    margin-top: 32px;
    background: var(--bg2);
    border: 1px solid rgba(255,45,85,0.2);
    border-radius: 14px;
    overflow: hidden;
}

.admin-section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,45,85,0.05);
}

.admin-section-header .tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--red);
    background: rgba(255,45,85,0.12);
    padding: 3px 8px;
    border-radius: 5px;
}

.admin-section-header h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted2);
}

.admin-form-inner {
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }

.form-group label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
}

.form-group input,
.form-group textarea {
    padding: 11px 14px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.form-group input::placeholder,
.form-group textarea::placeholder { color: var(--muted); font-family: var(--sans); }

.form-group input:focus,
.form-group textarea:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 3px var(--red-glow);
}

.form-group textarea {
    resize: vertical;
    min-height: 90px;
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.6;
}

.btn-save {
    grid-column: 1 / -1;
    padding: 13px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: var(--sans);
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
}

.btn-save:hover { background: var(--red-dark); transform: translateY(-1px); }

/* ── ERROR / LOADING STATES ── */
.state-error {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    background: rgba(255,45,85,0.07);
    border: 1px solid rgba(255,45,85,0.2);
    border-radius: 8px;
    font-size: 13px;
    color: var(--red);
    margin-top: 12px;
}
</style>
</head>
<body>

<!-- ADMIN BAR -->
<div class="admin-bar" id="adminBar">
    <span class="admin-bar-label">Admin</span>
    <input type="text"     id="adminLogin" placeholder="login">
    <input type="password" id="adminPass"  placeholder="hasło">
    <button class="btn-login" onclick="adminLogin()">Zaloguj</button>
</div>

<!-- PAGE -->
<div class="page">

    <!-- HEADER -->
    <div class="header">
        <a href="https://gkfbaza.pl/" class="logo-wrap">
            <img src="https://dailymta.pl/FORUM/uploads/monthly_2024_01/logo512.png.b88e4caaa9beddd2d8365bfce33c4f2a.png" alt="Logo">
        </a>
        <div class="site-title">Wyszukiwarka <span>SID</span></div>
        <div class="site-sub">Baza danych użytkowników serwera</div>
        <div class="stats-chip">
            Zarejestrowanych graczy:&nbsp;<span class="count" id="userCount">—</span>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-wrap">
        <input type="text" id="sidInput" placeholder="Wpisz SID gracza..."
               onkeydown="if(event.key==='Enter') searchSID()">
        <button class="btn-search" onclick="searchSID()">SZUKAJ</button>
    </div>

    <!-- RESULT -->
    <div class="result-box" id="result">
        <div class="result-placeholder">
            <div class="icon">🔍</div>
            Wyniki wyszukiwania pojawią się tutaj
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div class="admin-section" id="adminPanel" style="display:none;">
        <div class="admin-section-header">
            <span class="tag">Admin</span>
            <h3>Edycja rekordu</h3>
        </div>
        <div class="admin-form-inner">
            <div class="form-group">
                <label>SID</label>
                <input type="text" id="newSID" placeholder="np. 12345678">
            </div>
            <div class="form-group">
                <label>Nick</label>
                <input type="text" id="newNick" placeholder="nick gracza">
            </div>
            <div class="form-group full">
                <label>Status</label>
                <input type="text" id="newStatus" placeholder="np. Aktywny / Zbanowany">
            </div>
            <div class="form-group full">
                <label>Notatki</label>
                <textarea id="newNotatki" placeholder="Dodatkowe informacje..."></textarea>
            </div>
            <button class="btn-save" onclick="saveUser()">Zapisz / Zaktualizuj rekord</button>
        </div>
    </div>

</div><!-- /page -->

<script>
let adminToken = null;

const API_URL      = "https://sid-api.zeberka-pasiasta69.workers.dev";
const LS_LOGIN     = "sid_admin_login";
const LS_PASS      = "sid_admin_pass";

function sanitize(str) {
    if (!str) return "";
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

/* ── Admin bar ── */
function showLoggedBadge(name) {
    document.getElementById("adminBar").innerHTML = `
        <span class="logged-badge">
            <span class="dot"></span>
            ${sanitize(name)}
        </span>
        <button class="btn-logout" onclick="adminLogout()">Wyloguj</button>
    `;
}

function adminLogout() {
    adminToken = null;
    localStorage.removeItem(LS_LOGIN);
    localStorage.removeItem(LS_PASS);
    document.getElementById("adminPanel").style.display = "none";
    location.reload();
}

async function adminLogin() {
    const login = document.getElementById("adminLogin").value.trim();
    const pass  = document.getElementById("adminPass").value;
    try {
        const res    = await fetch(`${API_URL}?action=login&login=${encodeURIComponent(login)}&password=${encodeURIComponent(pass)}`);
        const result = await res.json();
        if (result.token) {
            adminToken = result.token;
            localStorage.setItem(LS_LOGIN, login);
            localStorage.setItem(LS_PASS,  pass);
            document.getElementById("adminPanel").style.display = "block";
            showLoggedBadge(login);
            alert("Zalogowano jako admin");
        } else {
            alert("Błędny login lub hasło");
        }
    } catch (err) {
        console.error("LOGIN ERROR:", err);
        alert("Błąd logowania");
    }
}

async function tryAutoLogin() {
    const login = localStorage.getItem(LS_LOGIN);
    const pass  = localStorage.getItem(LS_PASS);
    if (!login || !pass) return;

    document.getElementById("adminLogin").value = login;
    document.getElementById("adminPass").value  = pass;

    try {
        const res    = await fetch(`${API_URL}?action=login&login=${encodeURIComponent(login)}&password=${encodeURIComponent(pass)}`);
        const result = await res.json();
        if (result.token) {
            adminToken = result.token;
            document.getElementById("adminPanel").style.display = "block";
            showLoggedBadge(login);
        }
    } catch (err) {
        console.error("AUTO-LOGIN ERROR:", err);
    }
}

/* ── Save ── */
async function saveUser() {
    if (!adminToken) { alert("Brak autoryzacji"); return; }

    const SID     = document.getElementById("newSID").value;
    const NICK    = document.getElementById("newNick").value;
    const STATUS  = document.getElementById("newStatus").value;
    const NOTATKI = document.getElementById("newNotatki").value;
    const ADMIN   = localStorage.getItem(LS_LOGIN) || "";

    try {
        const res    = await fetch(`${API_URL}?action=save&token=${adminToken}` +
            `&SID=${encodeURIComponent(SID)}` +
            `&NICK=${encodeURIComponent(NICK)}` +
            `&STATUS=${encodeURIComponent(STATUS)}` +
            `&NOTATKI=${encodeURIComponent(NOTATKI)}` +
            `&ADMIN=${encodeURIComponent(ADMIN)}`);
        const result = await res.json();
        if (result.success) { alert("Zapisano!"); searchSID(); }
        else                { alert("Błąd zapisu"); }
    } catch (err) {
        console.error("SAVE ERROR:", err);
        alert("Błąd zapisu");
    }
}

/* ── Search ── */
async function searchSID() {
    const sid = document.getElementById("sidInput").value.trim();
    if (!sid) return;

    const box = document.getElementById("result");
    box.classList.remove("has-data");
    box.innerHTML = `<div class="result-placeholder"><div class="icon">⏳</div>Szukam...</div>`;

    try {
        const res  = await fetch(`${API_URL}?action=get`);
        const data = await res.json();

        const user = data.find(u =>
            String(u.SID).replace(/\s+/g, "") === sid.replace(/\s+/g, "")
        );

        if (user) {
            box.classList.add("has-data");

            let formattedDate = "—";
            if (user.LAST_EDIT) {
                formattedDate = new Date(user.LAST_EDIT).toLocaleString("pl-PL", {
                    year: "numeric", month: "2-digit", day: "2-digit",
                    hour: "2-digit", minute: "2-digit"
                });
            }

            const notesHtml = sanitize(user.NOTATKI || "—").replace(/\n/g, "<br>");

            box.innerHTML = `
                <div class="result-header">
                    <span class="result-header-dot"></span>
                    <h3>Dane użytkownika</h3>
                </div>
                <div class="data-grid">
                    <div class="data-field">
                        <div class="label">SID</div>
                        <div class="value sid-val">${sanitize(user.SID)}</div>
                    </div>
                    <div class="data-field">
                        <div class="label">Nick</div>
                        <div class="value">${sanitize(user.NICK || "—")}</div>
                    </div>
                    <div class="data-field full">
                        <div class="label">Status</div>
                        <div class="value">${sanitize(user.STATUS || "—")}</div>
                    </div>
                    <div class="data-field full">
                        <div class="label">Notatki</div>
                        <div class="notes-val">${notesHtml}</div>
                    </div>
                </div>
                <div class="result-footer">
                    Ostatnia edycja przez&nbsp;<strong>${sanitize(user.EDITED_BY || "—")}</strong>&nbsp;·&nbsp;${formattedDate}
                </div>
            `;

            if (adminToken) {
                document.getElementById("newSID").value     = user.SID     || "";
                document.getElementById("newNick").value    = user.NICK    || "";
                document.getElementById("newStatus").value  = user.STATUS  || "";
                document.getElementById("newNotatki").value = user.NOTATKI || "";
            }
        } else {
            box.innerHTML = `
                <div class="not-found">
                    <span class="nf-icon">✕</span>
                    Nie znaleziono gracza o podanym SID
                </div>`;
        }
    } catch (err) {
        console.error("SEARCH ERROR:", err);
        box.innerHTML = `<div class="state-error">⚠ Błąd ładowania danych z serwera</div>`;
    }
}

/* ── User count ── */
async function loadUserCount() {
    try {
        const res  = await fetch(`${API_URL}?action=get`);
        const data = await res.json();
        document.getElementById("userCount").textContent = Array.isArray(data) ? data.length : "?";
    } catch {
        document.getElementById("userCount").textContent = "—";
    }
}

tryAutoLogin();
loadUserCount();
</script>
</body>
</html>
