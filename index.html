<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Wyszukiwarka SID</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1a0f2e, #090014);
    background-attachment: fixed;
    color: white;
    text-align: center;
}

.container {
    padding-top: 80px;
}

.logo {
    width: 140px;
    margin-bottom: 15px;
}

h1 {
    font-size: 32px;
    margin: 10px 0 5px 0;
}

.subtitle {
    color: #aaa;
    margin-bottom: 10px;
}

.search-box {
    display: inline-flex;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 8px;
    backdrop-filter: blur(10px);
    margin-top: 10px;
}

.search-box input {
    border: none;
    background: transparent;
    padding: 12px;
    color: white;
    width: 250px;
    outline: none;
}

.search-box button {
    background: #ff2d55;
    border: none;
    padding: 12px 20px;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.search-box button:hover {
    background: #e11d48;
}

.result-box {
    margin: 40px auto;
    width: 70%;
    min-height: 250px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 20px;
    backdrop-filter: blur(15px);
    text-align: left;
}

/* ── NOWY PASEK ADMINA ── */
.admin-bar {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(10, 5, 20, 0.75);
    padding: 10px 14px;
    border-radius: 12px;
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 45, 85, 0.25);
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    z-index: 999;
}

.admin-bar label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 2px;
}

.admin-bar input {
    padding: 7px 10px;
    border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.07);
    color: white;
    font-size: 13px;
    width: 95px;
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
}

.admin-bar input::placeholder {
    color: #555;
}

.admin-bar input:focus {
    border-color: rgba(255, 45, 85, 0.6);
    box-shadow: 0 0 0 2px rgba(255, 45, 85, 0.15);
}

.admin-bar button {
    background: #ff2d55;
    border: none;
    color: white;
    padding: 7px 13px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.03em;
    transition: background 0.2s, transform 0.15s;
}

.admin-bar button:hover {
    background: #e11d48;
    transform: translateY(-1px);
}

/* status po zalogowaniu */
.admin-bar .logged-badge {
    font-size: 12px;
    color: #4ade80;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
}

.admin-bar .logged-badge::before {
    content: '';
    display: inline-block;
    width: 7px;
    height: 7px;
    background: #4ade80;
    border-radius: 50%;
    box-shadow: 0 0 6px #4ade80;
}

/* ── PANEL ADMINA ── */
.admin-panel {
    margin: 60px auto;
    width: 500px;
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 30px;
    backdrop-filter: blur(15px);
}

.admin-panel h3 {
    margin-bottom: 25px;
    text-align: center;
}

.admin-form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.admin-form input,
.admin-form textarea {
    background: rgba(255,255,255,0.07);
    border: none;
    padding: 12px;
    border-radius: 8px;
    color: white;
    outline: none;
    font-size: 14px;
}

.admin-form input:focus,
.admin-form textarea:focus {
    box-shadow: 0 0 8px #ff2d55;
}

.admin-form textarea {
    resize: vertical;
    min-height: 100px;
    max-height: 200px;
}

.admin-save-btn {
    background: #ff2d55;
    border: none;
    padding: 12px;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s ease;
}

.admin-save-btn:hover {
    background: #e11d48;
    transform: translateY(-2px);
}

.stats-box {
    margin: 22px 0;
    font-size: 16px;
    color: #ccc;
    text-align: center;
}

.stats-box span {
    color: #ff2d55;
    font-weight: bold;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="admin-bar" id="adminBar">
    <label>Login</label>
    <input type="text"     id="adminLogin" placeholder="nazwa">
    <label>Hasło</label>
    <input type="password" id="adminPass"  placeholder="••••••">
    <button onclick="adminLogin()">Zaloguj</button>
</div>

<div class="container">

    <a href="https://gkfbaza.pl/">
        <img src="https://dailymta.pl/FORUM/uploads/monthly_2024_01/logo512.png.b88e4caaa9beddd2d8365bfce33c4f2a.png" class="logo">
    </a>

    <h1>Wyszukiwarka SID</h1>
    <div class="subtitle">Baza danych użytkowników na serwerze.</div>

    <div class="stats-box">
        Wpisanych użytkowników: <span id="userCount">Ładowanie...</span>
    </div>

    <div class="search-box">
        <input type="text" id="sidInput" placeholder="Wpisz SID"
               onkeydown="if(event.key==='Enter') searchSID()">
        <button onclick="searchSID()">SZUKAJ</button>
    </div>

    <div class="result-box" id="result">
        Wyniki wyszukiwania pojawią się tutaj...
    </div>

    <div id="adminPanel" class="admin-panel" style="display:none;">
        <h3>Panel Admina</h3>
        <div class="admin-form">
            <input type="text" id="newSID"     placeholder="SID">
            <input type="text" id="newNick"    placeholder="Nick">
            <input type="text" id="newStatus"  placeholder="Status">
            <textarea          id="newNotatki" placeholder="Notatki"></textarea>
            <button class="admin-save-btn" onclick="saveUser()">Zapisz / Edytuj</button>
        </div>
    </div>

</div>

<script>

let adminToken = null;

const API_URL = "https://sid-api.zeberka-pasiasta69.workers.dev";
const STORAGE_LOGIN = "sid_admin_login";
const STORAGE_PASS  = "sid_admin_pass";

// ── Sanitizacja XSS ──
function sanitize(str) {
    if (!str) return "";
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

// ── Pasek: zamień pola na zielony badge po zalogowaniu ──
function showLoggedBadge(loginName) {
    const bar = document.getElementById("adminBar");
    bar.innerHTML = `
        <span class="logged-badge">Admin: ${sanitize(loginName)}</span>
        <button onclick="adminLogout()">Wyloguj</button>
    `;
}

function adminLogout() {
    adminToken = null;
    localStorage.removeItem(STORAGE_LOGIN);
    localStorage.removeItem(STORAGE_PASS);
    document.getElementById("adminPanel").style.display = "none";
    location.reload();
}

async function adminLogin() {
    try {
        const login = document.getElementById("adminLogin").value.trim();
        const pass  = document.getElementById("adminPass").value;

        const response = await fetch(
            `${API_URL}?action=login&login=${encodeURIComponent(login)}&password=${encodeURIComponent(pass)}`
        );

        const result = await response.json();

        if (result.token) {
            adminToken = result.token;

            // Zapamiętaj dane w localStorage
            localStorage.setItem(STORAGE_LOGIN, login);
            localStorage.setItem(STORAGE_PASS,  pass);

            document.getElementById("adminPanel").style.display = "block";
            showLoggedBadge(login);
            alert("Zalogowano jako admin");
        } else {
            alert("Błędny login lub hasło");
        }

    } catch (err) {
        console.error("LOGIN ERROR:", err);
        alert("Błąd logowania");
    }
}

// ── Auto-login przy starcie strony ──
async function tryAutoLogin() {
    const login = localStorage.getItem(STORAGE_LOGIN);
    const pass  = localStorage.getItem(STORAGE_PASS);
    if (!login || !pass) return;

    // Wstaw dane do inputów (na wypadek gdyby auto-login się nie powiódł)
    document.getElementById("adminLogin").value = login;
    document.getElementById("adminPass").value  = pass;

    try {
        const response = await fetch(
            `${API_URL}?action=login&login=${encodeURIComponent(login)}&password=${encodeURIComponent(pass)}`
        );
        const result = await response.json();

        if (result.token) {
            adminToken = result.token;
            document.getElementById("adminPanel").style.display = "block";
            showLoggedBadge(login);
        }
        // jeśli token wygasł / hasło się zmieniło – nic nie robimy, pola już wypełnione
    } catch (err) {
        console.error("AUTO-LOGIN ERROR:", err);
    }
}

async function saveUser() {
    if (!adminToken) { alert("Brak autoryzacji"); return; }

    const SID     = document.getElementById("newSID").value;
    const NICK    = document.getElementById("newNick").value;
    const STATUS  = document.getElementById("newStatus").value;
    const NOTATKI = document.getElementById("newNotatki").value;
    const ADMIN   = localStorage.getItem(STORAGE_LOGIN) || "";

    try {
        const response = await fetch(
            `${API_URL}?action=save&token=${adminToken}` +
            `&SID=${encodeURIComponent(SID)}` +
            `&NICK=${encodeURIComponent(NICK)}` +
            `&STATUS=${encodeURIComponent(STATUS)}` +
            `&NOTATKI=${encodeURIComponent(NOTATKI)}` +
            `&ADMIN=${encodeURIComponent(ADMIN)}`
        );

        const result = await response.json();

        if (result.success) {
            alert("Zapisano!");
            searchSID();
        } else {
            alert("Błąd zapisu");
        }

    } catch (err) {
        console.error("SAVE ERROR:", err);
        alert("Błąd zapisu");
    }
}

async function searchSID() {
    try {
        const sid = document.getElementById("sidInput").value.trim();
        if (!sid) return;

        const response = await fetch(`${API_URL}?action=get`);
        const data = await response.json();

        const user = data.find(u =>
            String(u.SID).replace(/\s+/g, "") === sid.replace(/\s+/g, "")
        );

        const resultBox = document.getElementById("result");

        if (user) {
            const formattedNotes = sanitize(user.NOTATKI || "").replace(/\n/g, "<br>");

            let html = "<h3>Dane użytkownika:</h3>";
            html += `<p><strong>SID:</strong> ${sanitize(user.SID)}</p>`;
            html += `<p><strong>NICK:</strong> ${sanitize(user.NICK)}</p>`;
            html += `<p><strong>STATUS:</strong> ${sanitize(user.STATUS)}</p>`;
            html += `<p><strong>NOTATKI:</strong><br>${formattedNotes}</p>`;
            html += `<hr style="margin:20px 0; opacity:0.2;">`;

            let formattedDate = "-";
            if (user.LAST_EDIT) {
                const date = new Date(user.LAST_EDIT);
                formattedDate = date.toLocaleString("pl-PL", {
                    year:   "numeric",
                    month:  "2-digit",
                    day:    "2-digit",
                    hour:   "2-digit",
                    minute: "2-digit"
                });
            }

            html += `<p style="color:#aaa; font-size:14px;">
                Ostatnia edycja: <strong>${sanitize(user.EDITED_BY || "-")}</strong> | ${formattedDate}
            </p>`;

            resultBox.innerHTML = html;

            if (adminToken) {
                document.getElementById("newSID").value     = user.SID     || "";
                document.getElementById("newNick").value    = user.NICK    || "";
                document.getElementById("newStatus").value  = user.STATUS  || "";
                document.getElementById("newNotatki").value = user.NOTATKI || "";
            }

        } else {
            resultBox.innerHTML = "❌ Nie znaleziono SID.";
        }

    } catch (err) {
        console.error("SEARCH ERROR:", err);
        document.getElementById("result").innerHTML = "⚠ Błąd ładowania danych.";
    }
}

async function loadUserCount() {
    try {
        const response = await fetch(`${API_URL}?action=get`);
        const data = await response.json();
        document.getElementById("userCount").textContent = Array.isArray(data) ? data.length : "?";
    } catch (err) {
        console.error("COUNT ERROR:", err);
        document.getElementById("userCount").textContent = "Błąd";
    }
}

// ── Start ──
tryAutoLogin();
loadUserCount();

</script>

</body>
</html>
